; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nicenano]
platform = nordicnrf52
board = nicenano
framework = arduino
;lib_deps =  https://github.com/adafruit/Adafruit_nRF52_Arduino //To add Ble support and other features, if something doesnt work try add this lib.

; Source is grouped by domain under src/. Add each subfolder to the include
; path so the existing flat includes (e.g. #include "I2CBus.h") keep resolving
; regardless of which folder a header lives in. Add a new -I line here whenever
; you introduce a new src/ subfolder.
build_flags =
    -I src/drivers
    -I src/fusion
    -I src/radio
    -I src/platform
    -I src/storage
